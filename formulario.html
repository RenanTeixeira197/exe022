<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Formulário de Pesquisa</title>
</head>
<body>

  <header>
    <h1>Pesquisa Online</h1>
  </header>

  <main>
    <form action="" method="get" class="dataForm">
      
      <fieldset>
        <legend>Dados Pessoais</legend>
        
        <p>
          <label for="userName">Nome:</label>
          <input type="text" id="userName" name="nome" required>
        </p>
        
        <p>
          <label for="userAge">Idade:</label>
          <input type="number" id="userAge" name="idade" min="12" max="100">
        </p>
        
        <p>
          <label for="birthDate">Data de Nascimento:</label>
          <input type="date" id="birthDate" name="data_nascimento">
        </p>

        <p>
          <label for="uploadFile">Enviar Arquivo:</label>
          <input type="file" id="uploadFile" name="arquivo">
        </p>
      </fieldset>

      <fieldset>
        <legend>Perfil</legend>
        
        <p>Gênero:</p>
        <p>
          <input type="radio" id="genderF" name="genero" value="feminino">
          <label for="genderF">Feminino</label>
          
          <input type="radio" id="genderM" name="genero" value="masculino">
          <label for="genderM">Masculino</label>
          
          <input type="radio" id="genderNone" name="genero" value="não-informado">
          <label for="genderNone">Prefiro não Informar</label>
        </p>
        
        <p>
          <label for="userState">Estado Civil:</label>
          <select id="userState" name="estado_civil">
            <option value="">Selecione...</option>
            <option value="solteiro">Solteiro(a)</option>
            <option value="casado">Casado(a)</option>
            <option value="divorciado">Divorciado(a)</option>
            <option value="viuvo">Viúvo(a)</option>
          </select>
        </p>
      </fieldset>

      <fieldset>
        <legend>Localidade</legend>
        
        <p>
          <label for="estado">Estado:</label>
          <select id="estado" name="estado" required>
            <option value="">Selecione um estado</option>
            <option value="AC">Acre</option>
            <option value="AL">Alagoas</option>
            <option value="AP">Amapá</option>
            <option value="AM">Amazonas</option>
            <option value="BA">Bahia</option>
            <option value="CE">Ceará</option>
            <option value="DF">Distrito Federal</option>
            <option value="ES">Espírito Santo</option>
            <option value="GO">Goiás</option>
            <option value="MA">Maranhão</option>
            <option value="MT">Mato Grosso</option>
            <option value="MS">Mato Grosso do Sul</option>
            <option value="MG">Minas Gerais</option>
            <option value="PA">Pará</option>
            <option value="PB">Paraíba</option>
            <option value="PR">Paraná</option>
            <option value="PE">Pernambuco</option>
            <option value="PI">Piauí</option>
            <option value="RJ">Rio de Janeiro</option>
            <option value="RN">Rio Grande do Norte</option>
            <option value="RS">Rio Grande do Sul</option>
            <option value="RO">Rondônia</option>
            <option value="RR">Roraima</option>
            <option value="SC">Santa Catarina</option>
            <option value="SP">São Paulo</option>
            <option value="SE">Sergipe</option>
            <option value="TO">Tocantins</option>
          </select>
        </p>

        <p>
          <label for="userCity">Cidade:</label>
          <input type="text" id="userCity" name="cidade">
        </p>
      </fieldset>

      <fieldset>
        <legend>Redes Sociais</legend>
        <p>
          <input type="checkbox" name="facebook" id="facebook" value="sim">
          <label for="facebook">Facebook</label>
        </p>
        <p>
          <input type="checkbox" name="instagram" id="instagram" value="sim">
          <label for="instagram">Instagram</label>
        </p>
        <p>
          <input type="checkbox" name="linkedin" id="linkedin" value="sim">
          <label for="linkedin">LinkedIn</label>
        </p>
      </fieldset>

      <fieldset>
        <legend>Gênero Musical</legend>
        <label for="musicStyle">Estilo Musical:</label>
        <br>
        <input name="userMusicStyle" type="list" id="musicStyle">
        <p>
            <label for="igen">Gênero musical:</label>
            <input type="text" name="gen" id="igen" list="generos">
        </p>

        <datalist id="generos">
            <option value="Rock">
            <option value="Pop">
            <option value="MPB">
            <option value="Samba">
            <option value="Pagode">
            <option value="Sertanejo">
            <option value="Forró">
            <option value="Funk">
            <option value="Rap">
            <option value="Hip Hop">
            <option value="Jazz">
            <option value="Blues">
            <option value="Eletrônica">
            <option value="Reggae">
        </datalist>
        
        <label for="favColor">Cor Favorita:</label>
        <input type="color" name="" id="favColor">

      </fieldset>

     <fieldset>
      <legend>Pesquisa de Satisfação</legend>
      <p>
        <input type="radio" id="bom" name="satisfacao" value="bom">
        <label for="bom">Bom</label>
        
        <input type="radio" id="regular" name="satisfacao" value="regular">
        <label for="regular">Regular</label>
        
        <input type="radio" id="ruim" name="satisfacao" value="ruim">
        <label for="ruim">Ruim</label>
      </p>
      <label for="userFeedback">Deixe sua Opinião (Opicional)</label>
      <br>
      <textarea placeholder="Max 200 Caracteres" id="userFeedback" max="200"></textarea>
     </fieldset>
     
     <div class="form-actions">
        <button type="submit">Enviar Pesquisa</button>
     </div>
    </form>
  </main>

</body>
</html>
